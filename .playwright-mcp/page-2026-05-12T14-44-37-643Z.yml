    - heading "Om Brottsplatskartan" [level=2] [ref=e495]
    - paragraph [ref=e496]: Brottsplatskartan är en plattform som erbjuder aktuell information om händelser och brott som rapporteras av Polisen i Sverige. På sajten kan du enkelt ta del av de senaste nyheterna om brott på lokal nivå, kategoriserat efter län, stad och gata. Informationen hämtas direkt från Polisens RSS-flöden och presenteras på ett överskådligt sätt, så att du snabbt kan hålla dig uppdaterad om vad som händer i ditt närområde.
