name: Deploy to Hetzner

on:
  push:
    branches:
      - main
      - flytt-till-hetzner  # TODO: ta bort efter cutover
  # Tillåt manuell trigger via GitHub UI (Actions → Deploy to Hetzner → Run workflow)
  workflow_dispatch:

# Bara en deploy åt gången
concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: /opt/brottsplatskartan/deploy/deploy.sh
