# Auto-loadad av `docker compose up` för LOKAL utveckling.
# Ändringar ovanpå compose.yaml:
#
#  * App exposeas på localhost:8350 (ingen Caddy lokalt)
#  * Caddy disablas via profiles: [never]
#  * Redis exposeas på host för GUI-verktyg (MariaDB-port ligger i compose.yaml)
#  * Tileservern är opt-in via profile
#  * Dev-vänliga env-vars (config cache av, lägre log-nivå, ingen opcache)
#
# Koden + vendor/ + node_modules/ bind-mountas från host så du ser alla
# filer i editorn. MariaDB/Redis/Caddy behåller named volumes – de innehåller
# binärdata du ändå inte skulle läsa.
#
# På servern används enbart compose.yaml:
#   docker compose -f compose.yaml up -d

services:
  app:
    ports:
      - "127.0.0.1:8350:8080"
    environment:
      SSL_MODE: "off"
      LOG_OUTPUT_LEVEL: notice
      PHP_OPCACHE_ENABLE: "0"     # Ingen opcache i dev – snabbare iteration
      AUTORUN_LARAVEL_CONFIG_CACHE: "false"
      AUTORUN_LARAVEL_ROUTE_CACHE: "false"
      AUTORUN_LARAVEL_VIEW_CACHE: "false"
      AUTORUN_LARAVEL_EVENT_CACHE: "false"
    # Ingen override av volumes – vi använder bind-mount från base (./:/var/www/html)
    # så vendor/, node_modules/ och storage/ är synliga på host.

  # mariadb: port-mapping ligger numera i compose.yaml (127.0.0.1:33012:3306)
  # så samma binding gäller både lokalt och i prod. Åtkomst via SSH-tunnel
  # på prod, direkt på lokal.

  redis:
    ports:
      - "127.0.0.1:63012:6379"

  # Caddy ska inte köras lokalt – ingen port 80/443 öppen,
  # ingen Let's Encrypt för lokal utveckling.
  caddy:
    profiles: [never]
    ports: []

  # Tileservern startas alltid lokalt. Kräver att mbtiles finns i
  # ./deploy/tileserver/ – ladda ner med: ./deploy/download-tiles.sh
  tileserver:
    ports:
      - "127.0.0.1:8351:8080"
