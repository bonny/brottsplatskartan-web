worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # On-disk LRU-cache för tiles. max_size begränsar diskåtgång;
    # inactive vräker objekt som inte träffats på 30 d.
    proxy_cache_path /var/cache/nginx/tiles
        levels=1:2
        keys_zone=tiles:10m
        max_size=2g
        inactive=30d
        use_temp_path=off;

    upstream tileserver {
        server tileserver:8080;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://tileserver;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache tiles;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_valid any 1m;

            # Servera stale vid backend-fel eller medan ny tile genereras
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
